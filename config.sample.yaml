# LLM-Doze sample configuration
#
# Global authentication - applies to all listeners/routes unless overridden.
# Clients must send: Authorization: Bearer <token>
# Remove or set enabled: false to disable auth entirely.
auth:
  token: "your-secret-token-here"
  # enabled: true

listeners:
  # Exclusive multi-model routing on a single port.
  # Only one model can run at a time — requesting a different model
  # stops the current backend before starting the new one.
  # Prevents OOM from accidentally running multiple large models.
  - port: 8000
    exclusive: true
    routes:
      - name: vllm-large
        model: Large-Model-70B
        backend: localhost:8900
        start: docker compose -f /opt/llm/docker-compose-large.yml up -d
        stop: docker compose -f /opt/llm/docker-compose-large.yml down
        health: /health
        idle_timeout: 600
        startup_timeout: 300

      - name: vllm-small
        model: Small-Model-7B
        backend: localhost:8901
        start: docker compose -f /opt/llm/docker-compose-small.yml up -d
        stop: docker compose -f /opt/llm/docker-compose-small.yml down
        health: /health
        idle_timeout: 300

  # Single-route listener — requests are forwarded directly, no body inspection
  - port: 11434
    routes:
      - name: ollama
        backend: localhost:11435
        start: systemctl start ollama
        stop: systemctl stop ollama
        health: /api/tags
        idle_timeout: 600

  # Managed subprocess — the proxy spawns the process and kills it on stop
  - port: 8090
    routes:
      - name: reranker
        backend: localhost:8091
        start: /opt/llm/llama-server -m /opt/llm/models/bge-reranker-v2-m3.gguf --port 8091 --host 127.0.0.1 --reranking
        stop: managed-subprocess
        health: /health
        idle_timeout: 300
        # Per-route auth override (optional):
        # auth:
        #   token: "reranker-specific-token"
        #   enabled: true
